{{- if .Values.ingress.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ template "spark-thrift-server.fullname" . }}
  labels:
    {{- $labels := fromYaml (include "all_objects_labels_sts" .) | default dict }}
    {{- $customLabels := .Values.ingress.labels | default dict }}
    {{- mustMerge $labels $customLabels | toYaml | nindent 4 }}
{{- with .Values.ingress.annotations }}
  annotations:
{{ toYaml . | indent 4 }}
{{- end }}
spec:
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: {{ .Values.ingress.path }}
            pathType: Prefix
            backend:
              service:
                name: {{ template "spark-thrift-server.fullname" . }}-service
                port:
                  number: 4040
{{- end }}
